version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: algoforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: algoforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algoforge-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/algoforge
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      DOCKER_NETWORK_DISABLED: "true"
      DOCKER_CPU_LIMIT: "0.5"
      DOCKER_MEMORY_LIMIT: "256m"
      DOCKER_EXECUTION_TIMEOUT_MS: "5000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: algoforge-worker
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - backend
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/algoforge
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      REDIS_URL: redis://redis:6379
      DOCKER_NETWORK_DISABLED: "true"
      DOCKER_CPU_LIMIT: "0.5"
      DOCKER_MEMORY_LIMIT: "256m"
      DOCKER_EXECUTION_TIMEOUT_MS: "5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algoforge-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api

volumes:
  mongo_data:
  redis_data:
